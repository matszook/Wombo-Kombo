{% extends 'base.html' %}
{% block title %}Logg Inn / Registrer{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-header">
        <span class="logo-big">// FLASK AUTH</span>
        <h1>Velkommen <span>tilbake</span></h1>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('login', this)">Logg inn</div>
        <div class="tab" onclick="switchTab('register', this)">Registrer</div>
    </div>

    <div class="tab-content active" id="tab-login">
        <div class="tab-card">
            <form method="POST">
                <input type="hidden" name="action" value="login">
                <div class="form-group">
                    <label>Brukernavn</label>
                    <input type="text" name="username" required autofocus>
                </div>
                <div class="form-group">
                    <label>Passord</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="submit-btn">LOGG INN →</button>
            </form>
            <form method="POST" style="margin-top: 0.9rem;">
                <input type="hidden" name="action" value="guest">
                <button type="submit" class="btn btn-muted" style="width: 100%;">FORTSETT SOM GJEST</button>
            </form>
            <p style="margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted); font-family: 'Space Mono', monospace;">
                Gjest får rollen <span class="role-badge role-guest">guest</span> og kan bare lese eksisterende notater.
            </p>
        </div>
    </div>

    <div class="tab-content" id="tab-register">
        <div class="tab-card">
            <form method="POST">
                <input type="hidden" name="action" value="register">
                <div class="form-group">
                    <label>Fullt navn</label>
                    <input type="text" name="reg_name" required>
                </div>
                <div class="form-group">
                    <label>Brukernavn</label>
                    <input type="text" name="reg_username" required>
                </div>
                <div class="form-group">
                    <label>Passord</label>
                    <input type="password" name="reg_password" required>
                </div>
                <button type="submit" class="submit-btn">REGISTRER →</button>
            </form>
            <p style="margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted); font-family: 'Space Mono', monospace;">
                Nye brukere får rollen <span class="role-badge role-user">user</span> automatisk.
            </p>
        </div>
    </div>
</div>

<script>
    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        el.classList.add('active');
    }
</script>
{% endblock %}
